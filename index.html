<!DOCTYPE html>
<html lang="en" class="scroll-smooth bg-[#050505] text-white">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Technical Animator & 3D Generalist Portfolio. Unity, Blender, C# Projects.">
    <meta name="author" content="Enes Aksu">

    <title>Enes Aksu | Technical Animator</title>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Fonts: Anton (Headers) & Manrope (Body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@300;400;600;800&display=swap"
        rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        anton: ['Anton', 'sans-serif'],
                        manrope: ['Manrope', 'sans-serif'],
                    },
                    colors: {
                        dark: '#050505',
                        light: '#f5f5f5',
                        accent: '#ff3366',
                    }
                }
            }
        }
    </script>

    <style>
        /* Base Resets */
        body {
            font-family: 'Manrope', sans-serif;
            overflow-x: hidden;
            background-color: #050505;
        }

        h1,
        h2,
        h3,
        h4,
        .font-anton {
            font-family: 'Anton', sans-serif;
            text-transform: uppercase;
        }

        /* Mix Blend Navigation Overlay */
        .nav-overlay {
            mix-blend-mode: difference;
            z-index: 50;
        }

        /* Edge-to-Edge utilities */
        .edge-section {
            width: 100vw;
            min-height: 100vh;
        }

        /* Image Placeholder Gradients */
        .bg-placeholder-1 {
            background: linear-gradient(45deg, #1a1a2e, #16213e);
        }

        .bg-placeholder-2 {
            background: linear-gradient(45deg, #2c1a1a, #1a1a1a);
        }

        /* Hide scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #050505;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* Page Entrance Animations */
        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
        }

        .slide-up {
            animation: slideUp 0.6s ease-out forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Staggers */
        .delay-1 {
            animation-delay: 0.1s;
        }

        .delay-2 {
            animation-delay: 0.2s;
        }

        .delay-3 {
            animation-delay: 0.3s;
        }
    </style>
</head>

<body class="antialiased selection:bg-white selection:text-black">

    <div id="root"></div>

    <!-- 1) DATA (Configuration) -->
    <script src="config.js"></script>

    <!-- 2) LOGIC (Application) -->
    <script type="text/babel" src="app.js"></script>

</body>

</html>
