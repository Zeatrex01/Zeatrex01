<!DOCTYPE html>
<html lang="en" class="scroll-smooth bg-[#050505] text-white">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Enes Aksu ? Technical Animator & 3D Artist. Blender modelleme, Unity animasyon, oyun projesi portf÷y³.">
    <meta name="author" content="Enes Aksu">
    <meta name="robots" content="index, follow">

    <!-- Open Graph -->
    <meta property="og:title" content="Enes Aksu | 3D Artist & Technical Animator">
    <meta property="og:description" content="Blender modelleme, Unity animasyon ve oyun projeleri portf÷y³.">
    <meta property="og:type" content="website">

    <title>Enes Aksu | 3D Artist & Technical Animator</title>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Fonts: Anton (Headers) & Manrope (Body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@300;400;600;800&display=swap"
        rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        anton: ['Anton', 'sans-serif'],
                        manrope: ['Manrope', 'sans-serif'],
                    },
                    colors: {
                        dark: '#050505',
                        light: '#f5f5f5',
                        accent: '#ff3366',
                    }
                }
            }
        }
    </script>

    <style>
        /* Base Resets */
        body {
            font-family: 'Manrope', sans-serif;
            overflow-x: hidden;
            background-color: #050505;
        }

        /* Noise texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9998;
            opacity: 0.35;
        }

        h1,
        h2,
        h3,
        h4,
        .font-anton {
            font-family: 'Anton', sans-serif;
            text-transform: uppercase;
        }

        /* Mix Blend Navigation Overlay */
        .nav-overlay {
            mix-blend-mode: difference;
            z-index: 50;
        }

        /* Edge-to-Edge utilities */
        .edge-section {
            width: 100vw;
            min-height: 100vh;
        }

        /* Image Placeholder Gradients */
        .bg-placeholder-1 {
            background: linear-gradient(45deg, #1a1a2e, #16213e);
        }

        .bg-placeholder-2 {
            background: linear-gradient(45deg, #2c1a1a, #1a1a1a);
        }

        /* Hide scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #050505;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* Focus accessibility */
        :focus-visible {
            outline: 2px solid #ff3366;
            outline-offset: 3px;
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Page Entrance Animations */
        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
        }

        .slide-up {
            animation: slideUp 0.6s ease-out forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Staggers */
        .delay-1 {
            animation-delay: 0.1s;
        }

        .delay-2 {
            animation-delay: 0.2s;
        }

        .delay-3 {
            animation-delay: 0.3s;
        }
    </style>
</head>

<body class="antialiased selection:bg-white selection:text-black">

    <div id="root"></div>

    <!-- 1) DATA (Configuration) -->
    <script src="config.js"></script>

    <!-- 2) LOGIC (Application) -->
    <script type="text/babel" src="app.js"></script>

</body>

</html>
